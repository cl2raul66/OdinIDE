name: Bug Report
description: Reportar un bug o error
title: "[fix] "
labels: ["fix"]
assignees: []
body:
  - type: textarea
    id: descripcion
    attributes:
      label: Descripción
      description: Describe brevemente el bug
      placeholder: "¿Qué está fallando?"
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      description: Pasos para reproducir el bug
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Resultado esperado
      description: ¿Qué esperabas que pasara?
      placeholder: "Comportamiento esperado..."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
      description: ¿Qué es lo que realmente pasa?
      placeholder: "Comportamiento actual..."
    validations:
      required: true
